<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project:Etch-a-Sketch</title>
</head>
<body>
    <div class="header"><h1>The Crown Sketchbook</h1></div>
    <div class="color-buttons">
        <button class="color-choice" data-color="eraser">Eraser</button>
        <button class="color-choice" data-color="black">Default/Reset</button> 
        <button class="color-choice" data-color="rainbow">Rainbow
        </button>
        <button class="color-choice">Pick: <input type="color" id="input-color"></button>
        <button class="color-choice" data-color="gray">Grey Scale</button>

    </div>
    <div class="container">
        <div class="container-elements"></div>
    </div>

    <div class="ending-options">
        <button class="clear">Clear</button>

    <p>Pixel Size</p>
    <input type="range" min="4" max="100" value="30" id="sizeRange" class="slider">
    </div>
    
    <div class="footer">This is my project in The Odin Project Curriculum</div>
</body>
</html>
